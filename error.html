<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Error Login</title>
<link rel="icon" href="img/Home.Net.png" type="image/png" />
<link rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">

<style>

:root{
--bg:#180909;
--bg2:#2a0f0f;

--card:rgba(30,10,10,.75);

--text:#eef4ff;

--blue:#3b82f6;
--blue2:#2563eb;

--red:#ef4444;
}


/* RESET */

*{
margin:0;
padding:0;
box-sizing:border-box;
}


/* BODY */

body{

font-family:Inter,system-ui;

min-height:100vh;

background:
radial-gradient(circle at top, rgba(239,68,68,.2), transparent),
radial-gradient(circle at bottom, rgba(255,0,0,.08), transparent),
linear-gradient(180deg,var(--bg),var(--bg2));

display:flex;
align-items:center;
justify-content:center;

padding:20px;

color:var(--text);

}


/* STATUS POJOK */

.top-status{

position:fixed;
top:14px;
left:16px;

font-size:.9rem;
font-weight:700;

color:#fecaca;

display:flex;
align-items:center;
gap:6px;

}

.dot{

width:8px;
height:8px;
border-radius:50%;

background:#ef4444;

animation:blink 1s infinite;

box-shadow:0 0 8px #ef4444;

}

@keyframes blink{

0%{opacity:1}
50%{opacity:.2}
100%{opacity:1}

}


/* CARD */

.card{

width:100%;
max-width:420px;

background:var(--card);

border-radius:28px;

padding:30px 22px;

backdrop-filter:blur(18px);

box-shadow:
0 20px 60px rgba(0,0,0,.4),
0 0 25px rgba(239,68,68,.25);

text-align:center;

border:1px solid rgba(255,255,255,.08);

animation:shake .4s ease;

}


/* SHAKE */

@keyframes shake {

0% { transform: translateX(0); }

20% { transform: translateX(-6px); }

40% { transform: translateX(6px); }

60% { transform: translateX(-4px); }

80% { transform: translateX(4px); }

100% { transform: translateX(0); }

}


/* LOGO */

.logo{

width:70px;
height:70px;

margin:auto;

border-radius:18px;

display:flex;
align-items:center;
justify-content:center;

background:linear-gradient(135deg,#ef4444,#dc2626);

font-size:28px;
font-weight:800;

margin-bottom:12px;

color:white;

animation:pulse 1.5s infinite;

}

@keyframes pulse{

0%{transform:scale(1)}
50%{transform:scale(1.05)}
100%{transform:scale(1)}

}


/* TITLE */

h1{
font-size:1.4rem;
margin-bottom:16px;
}


/* ERROR BOX */

.error-box{

margin-top:10px;

border-radius:18px;

padding:18px;

background:rgba(239,68,68,.15);

border:1px solid rgba(239,68,68,.3);

}


/* BUTTONS */

.btns{

margin-top:20px;

display:grid;

gap:12px;

}


.btn{

height:52px;

border:none;

border-radius:16px;

font-weight:700;

display:flex;
align-items:center;
justify-content:center;

gap:8px;

cursor:pointer;

text-decoration:none;

color:white;

transition:.2s;

}


.btn-login{

background:linear-gradient(
135deg,
#3b82f6,
#2563eb
);

box-shadow:
0 0 12px rgba(59,130,246,.6),
0 0 25px rgba(59,130,246,.3);

}

.btn-admin{

background:linear-gradient(
135deg,
#ef4444,
#dc2626
);

box-shadow:
0 0 12px rgba(239,68,68,.6),
0 0 25px rgba(239,68,68,.3);

}


/* MARQUEE */

.marquee{

margin-top:14px;

overflow:hidden;
white-space:nowrap;

}

.marquee span{

display:inline-block;

padding-left:100%;

animation:marquee 14s linear infinite;

font-size:.85rem;

}

@keyframes marquee{

0%{transform:translateX(0)}
100%{transform:translateX(-100%)}

}


/* FOOTER */

.footer{

margin-top:14px;

font-size:.8rem;

color:#9fb3d9;

}
/* ===== BUTTON SHINE ===== */

.btn{
position:relative;
overflow:hidden;
}

.btn::before{

content:"";

position:absolute;
inset:0;

background:linear-gradient(
120deg,
transparent,
rgba(255,255,255,.5),
transparent
);

transform:translateX(-120%);

}

.btn:hover::before{

animation:shine .9s;

}

@keyframes shine{

100%{
transform:translateX(120%);
}

}
</style>

</head>
<body>


<div class="top-status">

<div class="dot"></div>

Login gagal

</div>


<div class="card">


<div class="logo">!</div>

<h1>Home.Net</h1>


<div class="error-box">

<i class="bi bi-x-circle"></i>

$(error)

</div>


<div class="btns">


<a href="$(link-login)"
class="btn btn-login">

<i class="bi bi-box-arrow-in-right"></i>

Login kembali

</a>


<a href="https://wa.me/6282152400352"
class="btn btn-admin">

<i class="bi bi-headset"></i>

Hubungi Admin

</a>


</div>


<div class="marquee">
<span>
⚠️ Voucher salah • Voucher habis • Hubungi Admin jika bermasalah • Jangan bagikan kode voucher
</span>
</div>


<div class="footer">
© 2026 Home.Net • Powered by MikroTik | Muhammad Rafiq Amin
</div>


</div>

</body>
</html>
