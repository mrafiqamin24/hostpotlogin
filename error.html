<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Error Login</title>
<link rel="icon" href="img/Home.Net.png" type="image/png" />
<link rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">

<style>
:root{
  --bg:#180909;
  --bg2:#2a0f0f;
  --card:rgba(30,10,10,.78);
  --text:#eef4ff;
  --muted:#fca5a5;
  --blue:#3b82f6;
  --blue2:#2563eb;
  --red:#ef4444;
  --red2:#dc2626;
  --red3:#7f1d1d;
  --line:rgba(255,255,255,.08);
  --glass:rgba(255,255,255,.04);
}

/* RESET */
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

html,body{
  width:100%;
  overflow-x:hidden;
}

/* BODY */
body{
  font-family:Inter,system-ui,sans-serif;
  min-height:100vh;
  background:
    radial-gradient(circle at 15% 20%, rgba(239,68,68,.18), transparent 28%),
    radial-gradient(circle at 85% 18%, rgba(220,38,38,.14), transparent 24%),
    radial-gradient(circle at 50% 100%, rgba(255,0,0,.10), transparent 35%),
    linear-gradient(180deg,var(--bg),var(--bg2));
  display:flex;
  align-items:center;
  justify-content:center;
  padding:20px;
  color:var(--text);
  position:relative;
}

/* BACKGROUND AMBIENCE */
body::before,
body::after{
  content:"";
  position:fixed;
  inset:auto;
  border-radius:50%;
  filter:blur(60px);
  pointer-events:none;
  z-index:0;
}

body::before{
  width:240px;
  height:240px;
  top:8%;
  left:8%;
  background:rgba(239,68,68,.10);
  animation:floatBlob 8s ease-in-out infinite;
}

body::after{
  width:280px;
  height:280px;
  bottom:6%;
  right:8%;
  background:rgba(220,38,38,.12);
  animation:floatBlob 10s ease-in-out infinite reverse;
}

@keyframes floatBlob{
  0%,100%{transform:translateY(0) translateX(0) scale(1)}
  50%{transform:translateY(-12px) translateX(10px) scale(1.08)}
}

/* STATUS POJOK */
.top-status{
  position:fixed;
  top:14px;
  left:16px;
  font-size:.92rem;
  font-weight:800;
  color:#fecaca;
  display:flex;
  align-items:center;
  gap:8px;
  z-index:5;
  padding:8px 12px;
  border-radius:999px;
  background:rgba(127,29,29,.28);
  border:1px solid rgba(239,68,68,.22);
  backdrop-filter:blur(10px);
  box-shadow:0 10px 30px rgba(0,0,0,.18);
}

.dot{
  width:8px;
  height:8px;
  border-radius:50%;
  background:#ef4444;
  animation:blink 1s infinite;
  box-shadow:0 0 8px #ef4444, 0 0 18px rgba(239,68,68,.8);
}

@keyframes blink{
  0%{opacity:1; transform:scale(1)}
  50%{opacity:.25; transform:scale(.82)}
  100%{opacity:1; transform:scale(1)}
}

/* CARD */
.card{
  width:100%;
  max-width:440px;
  background:
    linear-gradient(180deg, rgba(255,255,255,.05), rgba(255,255,255,.02)),
    var(--card);
  border-radius:30px;
  padding:30px 22px 22px;
  backdrop-filter:blur(18px);
  box-shadow:
    0 24px 70px rgba(0,0,0,.45),
    0 0 35px rgba(239,68,68,.14),
    inset 0 1px 0 rgba(255,255,255,.06);
  text-align:center;
  border:1px solid var(--line);
  animation:shake .4s ease;
  position:relative;
  overflow:hidden;
  z-index:1;
}

.card::before{
  content:"";
  position:absolute;
  inset:0;
  background:
    linear-gradient(135deg, rgba(255,255,255,.08), transparent 30%, transparent 70%, rgba(255,255,255,.03));
  pointer-events:none;
}

.card::after{
  content:"";
  position:absolute;
  top:-80px;
  right:-80px;
  width:180px;
  height:180px;
  border-radius:50%;
  background:radial-gradient(circle, rgba(239,68,68,.14), transparent 70%);
  filter:blur(12px);
  pointer-events:none;
}

/* SHAKE */
@keyframes shake {
  0% { transform: translateX(0); }
  20% { transform: translateX(-6px); }
  40% { transform: translateX(6px); }
  60% { transform: translateX(-4px); }
  80% { transform: translateX(4px); }
  100% { transform: translateX(0); }
}

/* LOGO */
.logo-wrap{
  position:relative;
  width:max-content;
  margin:0 auto 14px;
}

.logo-wrap::before{
  content:"";
  position:absolute;
  inset:-12px;
  border-radius:26px;
  background:radial-gradient(circle, rgba(239,68,68,.26), transparent 70%);
  filter:blur(10px);
  animation:haloPulse 2.2s ease-in-out infinite;
}

.logo{
  position:relative;
  width:84px;
  height:84px;
  margin:auto;
  border-radius:24px;
  display:flex;
  align-items:center;
  justify-content:center;
  background:
    linear-gradient(145deg, #ff5b5b, #dc2626 55%, #991b1b);
  font-size:34px;
  font-weight:800;
  color:white;
  box-shadow:
    0 16px 35px rgba(239,68,68,.32),
    inset 0 1px 0 rgba(255,255,255,.25),
    inset 0 -8px 18px rgba(0,0,0,.18);
  animation:iconPulse 1.8s infinite;
  overflow:hidden;
}

.logo::before{
  content:"";
  position:absolute;
  inset:-40%;
  background:conic-gradient(
    from 0deg,
    transparent 0deg,
    rgba(255,255,255,.75) 45deg,
    transparent 90deg,
    transparent 220deg,
    rgba(255,255,255,.18) 270deg,
    transparent 320deg
  );
  animation:spinShine 3.2s linear infinite;
}

.logo::after{
  content:"";
  position:absolute;
  width:130%;
  height:130%;
  background:radial-gradient(circle, rgba(255,255,255,.16), transparent 55%);
  animation:flashBreath 1.8s ease-in-out infinite;
}

.logo-icon{
  position:relative;
  z-index:2;
  display:inline-flex;
  align-items:center;
  justify-content:center;
  transform-origin:center;
  animation:crossPop 1.6s ease-in-out infinite;
  text-shadow:0 0 12px rgba(255,255,255,.28);
}

@keyframes spinShine{
  100%{transform:rotate(360deg)}
}

@keyframes iconPulse{
  0%,100%{transform:scale(1)}
  50%{transform:scale(1.05)}
}

@keyframes haloPulse{
  0%,100%{transform:scale(1); opacity:.8}
  50%{transform:scale(1.12); opacity:1}
}

@keyframes flashBreath{
  0%,100%{opacity:.45; transform:scale(.92)}
  50%{opacity:.9; transform:scale(1.08)}
}

@keyframes crossPop{
  0%,100%{transform:scale(1) rotate(0deg)}
  20%{transform:scale(1.14) rotate(-5deg)}
  40%{transform:scale(.96) rotate(4deg)}
  60%{transform:scale(1.08) rotate(-3deg)}
  80%{transform:scale(1) rotate(0deg)}
}

/* TITLE */
h1{
  font-size:1.52rem;
  margin-bottom:16px;
  letter-spacing:.3px;
}

/* ERROR BOX */
.error-box{
  margin-top:10px;
  border-radius:20px;
  padding:18px 16px;
  background:
    linear-gradient(180deg, rgba(239,68,68,.18), rgba(127,29,29,.18));
  border:1px solid rgba(239,68,68,.30);
  box-shadow:
    inset 0 1px 0 rgba(255,255,255,.04),
    0 10px 22px rgba(0,0,0,.12);
  display:grid;
  gap:8px;
}

.error-box i{
  font-size:1.1rem;
  color:#fecaca;
  filter:drop-shadow(0 0 6px rgba(239,68,68,.35));
}

/* BUTTONS */
.btns{
  margin-top:20px;
  display:grid;
  gap:12px;
}

.btn{
  height:54px;
  border:none;
  border-radius:17px;
  font-weight:800;
  display:flex;
  align-items:center;
  justify-content:center;
  gap:9px;
  cursor:pointer;
  text-decoration:none;
  color:white;
  transition:transform .2s ease, box-shadow .2s ease, filter .2s ease;
  position:relative;
  overflow:hidden;
  isolation:isolate;
}

.btn i{
  font-size:1rem;
}

.btn:hover{
  transform:translateY(-2px);
}

.btn:active{
  transform:translateY(0);
}

/* BUTTON SHINE */
.btn::before{
  content:"";
  position:absolute;
  inset:0;
  background:linear-gradient(
    120deg,
    transparent 10%,
    rgba(255,255,255,.42) 50%,
    transparent 90%
  );
  transform:translateX(-120%);
  z-index:1;
}

.btn:hover::before{
  animation:shine .9s;
}

.btn::after{
  content:"";
  position:absolute;
  inset:1px;
  border-radius:inherit;
  background:linear-gradient(180deg, rgba(255,255,255,.08), transparent);
  z-index:0;
  pointer-events:none;
}

.btn > *{
  position:relative;
  z-index:2;
}

.btn-login{
  background:linear-gradient(135deg, #3b82f6, #2563eb);
  box-shadow:
    0 0 12px rgba(59,130,246,.50),
    0 0 25px rgba(59,130,246,.20),
    0 12px 24px rgba(37,99,235,.22);
}

.btn-login:hover{
  box-shadow:
    0 0 16px rgba(59,130,246,.62),
    0 0 30px rgba(59,130,246,.28),
    0 16px 30px rgba(37,99,235,.26);
}

.btn-admin{
  background:linear-gradient(135deg, #ef4444, #dc2626);
  box-shadow:
    0 0 12px rgba(239,68,68,.52),
    0 0 25px rgba(239,68,68,.22),
    0 12px 24px rgba(220,38,38,.22);
}

.btn-admin:hover{
  box-shadow:
    0 0 16px rgba(239,68,68,.62),
    0 0 30px rgba(239,68,68,.30),
    0 16px 30px rgba(220,38,38,.28);
}

@keyframes shine{
  100%{
    transform:translateX(120%);
  }
}

/* MARQUEE */
.marquee{
  margin-top:16px;
  overflow:hidden;
  white-space:nowrap;
  border-top:1px solid rgba(255,255,255,.06);
  padding-top:12px;
}

.marquee span{
  display:inline-block;
  padding-left:100%;
  animation:marquee 14s linear infinite;
  font-size:.85rem;
  color:#ffd0d0;
}

@keyframes marquee{
  0%{transform:translateX(0)}
  100%{transform:translateX(-100%)}
}

/* FOOTER */
.footer{
  margin-top:14px;
  font-size:.8rem;
  color:#b8c4da;
  line-height:1.5;
}

/* RESPONSIVE */
@media (max-width:480px){
  body{
    padding:16px;
  }

  .top-status{
    top:12px;
    left:12px;
    font-size:.84rem;
    padding:7px 10px;
  }

  .card{
    max-width:100%;
    border-radius:26px;
    padding:26px 18px 18px;
  }

  .logo{
    width:78px;
    height:78px;
    font-size:30px;
    border-radius:22px;
  }

  h1{
    font-size:1.36rem;
  }

  .btn{
    height:52px;
    font-size:.96rem;
  }

  .footer{
    font-size:.76rem;
  }
}
</style>
</head>
<body>

<div class="top-status">
  <div class="dot"></div>
  Login gagal
</div>

<div class="card">

  <div class="logo-wrap">
    <div style="color: #eef4ff;" class="logo">
      <span class="logo-icon">❌</span>
    </div>
  </div>

  <h1>Login Gagal😔</h1>

  <div class="error-box">
    <i class="bi bi-x-circle"></i>
    $(error)
  </div>

  <div class="btns">
    <a href="$(link-login)" class="btn btn-login">
      <i class="bi bi-box-arrow-in-right"></i>
      Login kembali
    </a>

    <a href="https://wa.me/6282152400352" class="btn btn-admin">
      <i class="bi bi-headset"></i>
      Hubungi Admin
    </a>
  </div>

  <div class="marquee">
    <span>
      ⚠️ Voucher salah • Voucher habis • Hubungi Admin jika bermasalah • Jangan bagikan kode voucher
    </span>
  </div>

  <div class="footer">
    © 2026 Home.Net • Powered by MikroTik | Muhammad Rafiq Amin
  </div>

</div>

<script>
  setTimeout(() => {
    const status = document.querySelector('.top-status');
    if (status) {
      status.style.transition = 'all .5s ease';
      status.style.opacity = '0';
      status.style.transform = 'translateY(-10px)';

      setTimeout(() => {
        status.remove();
      }, 500);
    }
  }, 5000);
</script>

</body>
</html>
